  <script>
    (() => {
      const THEME_COLORS = {
        light: { browser: '#f9fafb', appleStatusBar: 'default' },
        dark: { browser: '#09090B', appleStatusBar: 'black-translucent' },
      };
      const root = document.documentElement;
      const media = window.matchMedia?.('(prefers-color-scheme: dark)');
      const getMeta = (name) => {
        let meta = document.querySelector(`meta[name="${name}"]`);
        if (!meta) {
          meta = document.createElement('meta');
          meta.name = name;
          document.head.appendChild(meta);
        }
        return meta;
      };
      const resolveTheme = (themeMode) => themeMode === 'system'
        ? (media?.matches ? 'dark' : 'light')
        : themeMode;

      window.applyGeminiTheme = (themeMode = localStorage.getItem('geminiThemeMode') || 'system') => {
        const theme = THEME_COLORS[resolveTheme(themeMode)] || THEME_COLORS.light;
        root.dataset.theme = themeMode;
        getMeta('theme-color').content = theme.browser;
        getMeta('msapplication-navbutton-color').content = theme.browser;
        getMeta('apple-mobile-web-app-status-bar-style').content = theme.appleStatusBar;
      };

      window.applyGeminiTheme();
      const handleSystemThemeChange = () => {
        if ((localStorage.getItem('geminiThemeMode') || 'system') === 'system') window.applyGeminiTheme('system');
      };
      if (media?.addEventListener) media.addEventListener('change', handleSystemThemeChange);
      else if (media?.addListener) media.addListener(handleSystemThemeChange);
    })();
  </script>
  <link rel="stylesheet" href="./index.css" />
